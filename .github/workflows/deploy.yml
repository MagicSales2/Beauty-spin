name: CI/CD Pipeline - Hostinger VPS Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Code
        run: npm run lint

      - name: Build Application
        run: npm run build

      # ========================================================================
      # AUTOMATED DEPLOYMENT TO HOSTINGER VPS VIA DOCKER / SSH
      # Configure these secrets in your GitHub Repository:
      # Settings > Secrets and variables > Actions:
      # - VPS_HOST (Your Hostinger VPS IP / Domain)
      # - VPS_USERNAME (e.g., 'root' or your custom ssh user)
      # - VPS_SSH_KEY (Your private SSH key)
      # - VPS_PORT (Optional, defaults to 22)
      # ========================================================================
      - name: Deploy to Hostinger VPS
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            echo "Starting deployment on Hostinger VPS..."
            
            # 1. Define project folder named after repository
            PROJECT_DIR="/home/${{ secrets.VPS_USERNAME }}/${{ github.event.repository.name }}"
            if [ "${{ secrets.VPS_USERNAME }}" = "root" ]; then
              PROJECT_DIR="/root/${{ github.event.repository.name }}"
            fi
            
            echo "Target Deployment Directory: $PROJECT_DIR"
            
            # 2. Clone or pull the repository dynamically
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "Project directory does not exist. Cloning repository..."
              git clone https://github.com/${{ github.repository }}.git "$PROJECT_DIR"
              cd "$PROJECT_DIR"
            else
              echo "Project directory exists. Pulling latest code..."
              cd "$PROJECT_DIR"
              git fetch --all
              git reset --hard origin/main
            fi
            
            # 3. Prevent external network crash: Create the external proxy network if it doesn't exist
            echo "Ensuring proxy_network network exists..."
            docker network create proxy_network || true
            
            # 4. Spin up the containerized application behind Traefik
            echo "Launching docker-compose containers..."
            docker compose down --remove-orphans
            docker compose up -d --build
            
            echo "========================================="
            echo "Deployment to Hostinger VPS completed! 🎉"
            echo "========================================="
