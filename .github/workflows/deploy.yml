name: CI/CD Pipeline - Hostinger VPS Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Code
        run: npm run lint

      - name: Build Application
        run: npm run build

      # ========================================================================
      # AUTOMATED DOCKER BUILD & PUSH TO GITHUB CONTAINER REGISTRY (GHCR)
      # This builds a public Docker image that can be pulled from anywhere!
      # ========================================================================
      - name: Log in to the Container registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        if: github.ref == 'refs/heads/main'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest

      - name: Set up Docker Buildx
        if: github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ========================================================================
      # AUTOMATED DEPLOYMENT TO HOSTINGER VPS VIA DOCKER / SSH
      # Configure these secrets in your GitHub Repository:
      # Settings > Secrets and variables > Actions:
      # - VPS_HOST (Your Hostinger VPS IP / Domain)
      # - VPS_USERNAME (e.g., 'root' or your custom ssh user)
      # - VPS_SSH_KEY (Your private SSH key)
      # - VPS_PORT (Optional, defaults to 22)
      # ========================================================================
      - name: Deploy to Hostinger VPS
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            echo "Starting deployment on Hostinger VPS..."
            
            # 1. Define project folder (uses VPS_PROJECT_NAME secret if defined, otherwise falls back to repository name)
            PROJECT_NAME="${{ secrets.VPS_PROJECT_NAME }}"
            if [ -z "$PROJECT_NAME" ]; then
              PROJECT_NAME="${{ github.event.repository.name }}"
            fi
            
            PROJECT_DIR="/home/${{ secrets.VPS_USERNAME }}/$PROJECT_NAME"
            if [ "${{ secrets.VPS_USERNAME }}" = "root" ]; then
              PROJECT_DIR="/root/$PROJECT_NAME"
            fi
            
            echo "Target Deployment Directory: $PROJECT_DIR"
            
            # 2. Clone or pull the repository dynamically
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "Project directory does not exist. Cloning repository..."
              git clone https://github.com/${{ github.repository }}.git "$PROJECT_DIR"
              cd "$PROJECT_DIR"
            else
              echo "Project directory exists. Pulling latest code..."
              cd "$PROJECT_DIR"
              git fetch --all
              git reset --hard origin/main
            fi
            
            # 3. Dynamic adjustment of the docker-compose.yml file to pull the correct pre-built public image
            LOWER_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            echo "Injected Image Name: ghcr.io/${LOWER_REPO}:latest"
            
            # Replace the image tag or add it if not exists, and remove local build directive on production to load prebuilt image
            # This avoids having to compile anything on the VPS
            sed -i "s|image: .*|image: ghcr.io/${LOWER_REPO}:latest|g" docker-compose.yml
            
            # 4. Prevent external network crash: Create the external proxy network if it doesn't exist
            echo "Ensuring proxy_network network exists..."
            docker network create proxy_network || true
            
            # 5. Pull new image and spin up containers
            echo "Pulling latest pre-built public Docker image from GHCR..."
            docker compose pull app
            
            echo "Launching docker-compose containers..."
            docker compose down --remove-orphans
            docker compose up -d
            
            echo "========================================="
            echo "Deployment to Hostinger VPS completed! 🎉"
            echo "========================================="
