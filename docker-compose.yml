version: '3'

services:
  app:
    image: ghcr.io/PLACEHOLDER_OWNER/PLACEHOLDER_REPO:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slot_machine_app
    restart: always
    ports:
      # Puerto libre fallback para que pruebes tu aplicación directamente por IP (http://TU_IP_VPS:3080)
      - "3080:8080"
    networks:
      - proxy_network
    labels:
      - "traefik.enable=true"
      # Reemplaza 'tu-dominio.com' por el dominio que vayas a usar para tu juego de tragamonedas
      - "traefik.http.routers.slotmachine.rule=Host(`tu-dominio.com`) || Host(`www.tu-dominio.com`)"
      - "traefik.http.routers.slotmachine.entrypoints=web"
      
      # 🔒 Redirección automática a HTTPS y auto-SSL mediante Let's Encrypt
      - "traefik.http.routers.slotmachine-secure.rule=Host(`tu-dominio.com`) || Host(`www.tu-dominio.com`)"
      - "traefik.http.routers.slotmachine-secure.entrypoints=websecure"
      - "traefik.http.routers.slotmachine-secure.tls=true"
      - "traefik.http.routers.slotmachine-secure.tls.certresolver=letsencrypt"
      
      # Indica a Traefik que el servicio interno escucha en el puerto 8080 (donde corre nuestro Nginx en Docker)
      - "traefik.http.services.slotmachine-service.loadbalancer.server.port=8080"

networks:
  proxy_network:
    external: true

